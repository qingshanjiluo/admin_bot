name: 论坛管理机器人

on:
  schedule:
    # 北京时间 6:00, 12:00, 21:00 (UTC 22:00, 4:00, 13:00)
    - cron: '0 22,4,13 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  run-admin-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖（验证码识别所需）
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行管理机器人
        env:
          # 论坛账号和 API Key 仍从 Secrets 读取（敏感信息）
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 下面是行为参数，直接填写数字（可自由修改）
          TARGET_CATEGORIES: "2,5"      # 扫描的板块ID，逗号分隔
          MAX_THREADS: "30"              # 每个板块最多扫描帖子数
          SKIP_LATEST: "5"               # 每个板块跳过最新帖子数
          # 可选参数（如果需要）
          LOGIN_RETRIES: "50"
          CONTENT_SNIPPET_LENGTH: "200"
        run: python admin_bot.py

      - name: 提交状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add processed_admin.json
          git diff --staged --quiet || git commit -m "更新管理机器人状态"
          git push
