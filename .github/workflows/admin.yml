name: 论坛管理机器人（每4小时运行）

on:
  schedule:
    # 每4小时运行一次（UTC时间0,4,8,12,16,20 -> 北京时间8,12,16,20,0,4）
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  run-admin-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 单次扫描通常不超过30分钟
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖（验证码识别所需）
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行管理机器人（单次扫描模式）
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 可选参数（直接填写数值）
          TARGET_CATEGORIES: "2,5"      # 扫描板块ID
          MAX_THREADS: "30"              # 每个板块最多扫描帖子数
          SKIP_LATEST: "5"               # 每个板块跳过最新帖子数
        run: python admin_bot.py --once

      - name: 提交状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add processed_admin.json
          git diff --staged --quiet || git commit -m "更新管理机器人状态"
          git push
